{% extends "estudantes/base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8 col-lg-7"> 
        <div class="card shadow-sm border-0">
            <div class="card-header text-white" style="background-color: #19081E; padding: 1.5rem;">
                <h4 class="mb-0 fw-bold">Formulário de Matrícula</h4>
            </div>

            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    
                    <style>
                        form p label { display: block; margin-bottom: 5px; font-weight: 500; }
                        form p input, form p select { 
                            width: 100%; 
                            padding: 8px; 
                            border: 1px solid #ccc; 
                            border-radius: 4px;
                        }
                    </style>

                    {{ form.as_p }}
                    
                    <div class="mt-4 d-flex justify-content-end gap-2">
                        <a href="{% url 'estudantes:index' %}" class="btn px-4 py-2" style="background-color: #191919; color: white; border: none;">
                            Voltar
                        </a>
                        <button type="submit" class="btn text-white px-4 py-2" style="background-color: #761919; border: none;">
                            Salvar Aluno
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
